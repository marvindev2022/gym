[build]
  command = "pnpm install --frozen-lockfile=false && pnpm --filter @treinozap/web build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION             = "20"
  PNPM_VERSION             = "9.15.0"
  TURBO_TELEMETRY_DISABLED = "1"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
